name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }} (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_name: go-nfl-fantasy
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            binary_name: go-nfl-fantasy
          - os: macos-latest
            goos: darwin
            goarch: amd64
            binary_name: go-nfl-fantasy
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary_name: go-nfl-fantasy
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary_name: go-nfl-fantasy
          - os: windows-latest
            goos: windows
            goarch: arm64
            binary_name: go-nfl-fantasy

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -v -o ${{ matrix.binary_name }} .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.binary_name }}
          generate_release_notes: true
